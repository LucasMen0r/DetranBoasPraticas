app_python:
    build: ./app_python
    container_name: gandalf_interface
    depends_on:
      - db
      - ollama
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: DetranNorma
      DB_USER: postgres
      DB_PASS: abc321
      OLLAMA_HOST: http://ollama:11434
