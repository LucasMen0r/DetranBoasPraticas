services:
  db:
    image: ankane/pgvector:latest
    container_name: gandalf_db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: DetranNorma
      POSTGRES_PASSWORD: abc321
      POSTGRES_USER: postgres
    volumes:
      - gandalf_pgdata:/var/lib/postgresql/data
    networks:
      - app_network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    ports:
      - "11436:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app_network

  gendalf_treinador:
    build: ./app_python
    container_name: gendalf_treinador
    depends_on:
      - db
      - ollama
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: DetranNorma
      DB_USER: postgres
      DB_PASS: abc321
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ./app_python:/app
    networks:
      - app_network
    command: python /app/TreinoGendalf.py

  gendalf_gerador:
    build: ./app_python
    container_name: gendalf_gerador
    depends_on:
      - db
      - ollama
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: DetranNorma
      DB_USER: postgres
      DB_PASS: abc321
      OLLAMA_HOST: http://ollama:11434
      GERADOR_INTERVALO_MIN: "60"
    volumes:
      - ./app_python:/app
    networks:
      - app_network
    command: python /app/GerarPerguntasGendalf.py

networks:
  app_network:
    driver: bridge

volumes:
  gandalf_pgdata:
  ollama_data: